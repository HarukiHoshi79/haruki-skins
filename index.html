<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palette Skins by Haruki</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;

      /* 🌌 fundo animado */
      background: linear-gradient(-45deg, #0a0a0a, #1a1a2e, #16213e, #0f3460);
      background-size: 400% 400%;
      animation: bgMove 12s ease infinite;
    }

    @keyframes bgMove {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    /* overlay escuro */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      z-index: -1;
    }

    /* ===== HEADER ===== */
    .hero {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 70px 20px;
      text-align: center;
    }

    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 500px;
    }

    .glass h1 {
      margin: 0;
      font-size: 38px;
      letter-spacing: 2px;
    }

    .glass p {
      margin-top: 10px;
      color: #d1d1d1;
      font-size: 14px;
    }

    .line {
      width: 60px;
      height: 2px;
      background: #2ecc71;
      margin: 15px auto;
      border-radius: 5px;
    }

    .small {
      font-size: 12px;
      color: #aaa;
    }

    /* ===== GRID ===== */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(27, 27, 27, 0.85);
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
      border: 1px solid #2a2a2a;
      text-align: center;
      padding-bottom: 15px;
    }

    .card:hover {
      transform: scale(1.05);
      border-color: #2ecc71;
      box-shadow: 0 0 15px #2ecc71;
    }

    .card img {
      width: 100%;
      display: block;
    }

    .card h3 {
      margin: 10px;
      font-size: 16px;
    }

    .btn {
      display: inline-block;
      margin-top: 5px;
      padding: 8px 12px;
      background: #2ecc71;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 13px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="hero">
    <div class="glass">
      <h1>Palette Skins</h1>
      <p>by Haruki • aesthetic minecraft skins</p>
      <div class="line"></div>
      <p class="small">click on a skin to buy</p>
    </div>
  </header>

  <!-- SKINS -->
  <div class="container">
    <div class="grid">

      <div class="card">
        <a href="https://ko-fi.com/harukihoshi#" target="_blank">
          <img src="minhaskin.png" alt="Skin 1">
        </a>
        <h3>Sayuri Akemi - Sakura Outfit</h3>
        <a class="btn" href="https://ko-fi.com/harukihoshi#" target="_blank">Buy</a>
      </div>

      <div class="card">
        <a href="https://ko-fi.com/harukihoshi#" target="_blank">
          <img src="minhaskin2.png" alt="Skin 2">
        </a>
        <h3>Sayuri Akemi - Party Outfit</h3>
        <a class="btn" href="https://ko-fi.com/harukihoshi#" target="_blank">Buy</a>
      </div>

      <div class="card">
        <a href="https://ko-fi.com/harukihoshi#" target="_blank">
          <img src="customskin.png" alt="Skin 3">
        </a>
        <h3>Request a Custom Skin</h3>
        <a class="btn" href="https://ko-fi.com/harukihoshi#" target="_blank">Buy</a>
      </div>

    </div>
  </div>

  <footer>
    © 2026 Palette Skins by Haruki
  </footer>

</body>
</html>
