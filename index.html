<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haruki Skins</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
      background-size: cover;
      color: #ffffff;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: -1;
    
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
    }

    header {
      background: #1c1c1c;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #2ecc71;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      color: #2ecc71;
    }

    header p {
      margin: 5px 0 0;
      color: #aaa;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1b1b1b;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
      border: 1px solid #2a2a2a;
    }

    .card:hover {
      transform: scale(1.05);
      border-color: #2ecc71;
    }

    .card img {
      width: 100%;
      display: block;
    }

    .card h3 {
      margin: 10px;
      font-size: 16px;
      text-align: center;
      color: #fff;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 12px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #2ecc71;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Haruki Skins</h1>
    <p>Sua coleção de skins de Minecraft</p>
  </header>

  <div class="container">
    <div class="grid">

      <!-- EXEMPLO DE SKIN -->
      <div class="card">
        <img src="images/skin1.png" alt="Skin 1">
        <h3>Skin 1</h3>
      </div>

      <div class="card">
        <img src="images/skin2.png" alt="Skin 2">
        <h3>Skin 2</h3>
      </div>

      <div class="card">
        <img src="images/skin3.png" alt="Skin 3">
        <h3>Skin 3</h3>
      </div>

    </div>
  </div>

  <footer>
    © 2026 Haruki Hoshi - Feito com GitHub Pages
  </footer>

</body>
</html>
