<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palette Skins by Haruki</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
      background-size: cover;
      color: #ffffff;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: -1;
    }

    header {
      background: rgba(28, 28, 28, 0.85);
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #2ecc71;
      backdrop-filter: blur(5px);
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      color: #2ecc71;
    }

    header p {
      margin: 5px 0 0;
      color: #ccc;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(27, 27, 27, 0.9);
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
      border: 1px solid #2a2a2a;
      backdrop-filter: blur(4px);
      text-align: center;
      padding-bottom: 15px;
    }

    .card:hover {
      transform: scale(1.05);
      border-color: #2ecc71;
    }

    .card img {
      width: 100%;
      display: block;
      cursor: pointer;
    }

    .card h3 {
      margin: 10px;
      font-size: 16px;
      color: #fff;
    }

    .btn {
      display: inline-block;
      margin-top: 5px;
      padding: 8px 12px;
      background: #2ecc71;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 13px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Palette Skins by Haruki</h1>
    <p>Clique na skin para comprar</p>
  </header>

  <div class="container">
    <div class="grid">

      <div class="card">
        <a href="SEU_LINK_DE_PAGAMENTO_1" target="_blank">
          <img src="minhaskin.png" alt="Skin 1">
        </a>
        <h3>Skin 1</h3>
        <a class="btn" href="SEU_LINK_DE_PAGAMENTO_1" target="_blank">Comprar</a>
      </div>

      <div class="card">
        <a href="SEU_LINK_DE_PAGAMENTO_2" target="_blank">
          <img src="minhaskin2.png" alt="Skin 2">
        </a>
        <h3>Skin 2</h3>
        <a class="btn" href="SEU_LINK_DE_PAGAMENTO_2" target="_blank">Comprar</a>
      </div>

    </div>
  </div>

  <footer>
    © 2026 Haruki Hoshi - Feito com GitHub Pages
  </footer>

</body>
</html>
