<html lang="pt-BR">

      background-color: #111;

    h1 {

    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .card {
      background-color: #1e1e1e;
      padding: 15px;

    }

    .card img {
      width: 100%;
      border-radius: 5px;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      background-color: #00ff88;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #00cc6a;
    }
  </style>
</head>

<body>

  <h1>🎨 Palette Skins by Haruki</h1>

  <div class="container">

  <button class="btn">Comprar</button>
</a>
